<div class="container">
  <div class="row">
    <div class="col-md-6 offset-md-3">
      <h2 class="horizontal-center top-spacing">Language Detector</h2>
      <h5 class="form-group">
        <label class="top-spacing" for="text">Enter Text:</label>
        <textarea class="form-control top-spacing" id="text" [(ngModel)]="textInput" (input)="detectLanguage()"></textarea>
      </h5>
      <div *ngIf="!isValidLength()" class="alert alert-warning">Please enter atleast 10 characters</div>
      <h6 class="result top-spacing horizontal-center" *ngIf="result">{{ result }}</h6>
    </div>
  </div>
</div>
